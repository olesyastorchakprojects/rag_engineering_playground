version: 1

modules:
  hybrid_ingest:
    description: "Pre-codegen spec/code drift scaffold for the hybrid ingest pipeline."
    checks:
      - id: hybrid_ingest.public_api.single_python_entrypoint_exists
        direction: requirement
        category: public_api
        confidence: high
        title: "Hybrid ingest must exist as one Python entrypoint"
        description: "The generated implementation should be one Python script at Execution/ingest/hybrid/ingest.py."
        spec_paths:
          - Specification/codegen/ingest/hybrid.md
        code_paths:
          - Execution/ingest/hybrid/ingest.py
        test_paths:
          - Execution/tests/ingest/hybrid/full_ingest_e2e.py
        test_mode: any
        status_text:
          conforms: "Hybrid ingest entrypoint exists at the expected path."
          violates_spec: "Hybrid ingest entrypoint does not exist yet at Execution/ingest/hybrid/ingest.py."
        code_rules:
          - path: Execution/ingest/hybrid/ingest.py
            exists: true
            contains_all:
              - "def main()"
              - "if __name__ == \"__main__\":"
        spec_rules:
          - path: Specification/codegen/ingest/hybrid.md
            contains_all:
              - "the generated implementation must still be one Python script: `hybrid_ingest.py`"

      - id: hybrid_ingest.collection_name.derives_effective_name_from_strategy
        direction: requirement
        category: qdrant
        confidence: high
        title: "Hybrid ingest must derive effective collection name from strategy"
        description: "The implementation should automatically derive <base>_bow or <base>_bm25 and use it for Qdrant calls."
        spec_paths:
          - Specification/codegen/ingest/hybrid.md
          - Specification/contracts/ingest/hybrid_config.md
        code_paths:
          - Execution/ingest/hybrid/ingest.py
        test_paths:
          - Execution/tests/ingest/hybrid/effective_collection_name_derivation.py
          - Execution/tests/ingest/hybrid/hybrid_collection_create_shape.py
        test_mode: any
        status_text:
          conforms: "Hybrid ingest clearly derives and uses the effective collection name from strategy kind."
          violates_spec: "Hybrid ingest does not clearly derive and use the effective collection name from strategy kind."
        code_rules:
          - path: Execution/ingest/hybrid/ingest.py
            exists: true
            contains_all:
              - "bag_of_words"
              - "bm25_like"
              - "bow"
              - "bm25"
        spec_rules:
          - path: Specification/codegen/ingest/hybrid.md
            contains_all:
              - "bag_of_words` -> `bow`"
              - "bm25_like` -> `bm25`"
              - "effective collection name must equal:"

      - id: hybrid_ingest.qdrant.collection_create_uses_dense_sparse_and_metadata
        direction: requirement
        category: qdrant
        confidence: high
        title: "Hybrid ingest collection create path must send dense vectors, sparse_vectors, and metadata"
        description: "Collection creation should use the hybrid Qdrant body rather than a dense-only layout."
        spec_paths:
          - Specification/codegen/ingest/hybrid.md
        code_paths:
          - Execution/ingest/hybrid/ingest.py
        test_paths:
          - Execution/tests/ingest/hybrid/hybrid_collection_create_shape.py
          - Execution/tests/ingest/hybrid/qdrant_collection_metadata_roundtrip.py
        test_mode: any
        status_text:
          conforms: "Hybrid ingest collection creation clearly includes named vectors, sparse_vectors, and metadata."
          violates_spec: "Hybrid ingest collection creation does not clearly include the required hybrid Qdrant body."
        code_rules:
          - path: Execution/ingest/hybrid/ingest.py
            exists: true
            contains_all:
              - "\"sparse_vectors\""
              - "\"metadata\""
              - "dense_vector_name"
              - "sparse_vector_name"
        spec_rules:
          - path: Specification/codegen/ingest/hybrid.md
            contains_all:
              - "dense vectors are configured in `vectors`"
              - "sparse vectors are configured in `sparse_vectors`"
              - "Collection metadata must include:"

      - id: hybrid_ingest.artifacts.vocabulary_and_bm25_term_stats_lifecycle_exists
        direction: requirement
        category: artifacts
        confidence: high
        title: "Hybrid ingest must implement vocabulary lifecycle and bm25 term-stats lifecycle"
        description: "The implementation should load or create singleton vocabulary and, for bm25_like, load or create term stats before point processing."
        spec_paths:
          - Specification/codegen/ingest/hybrid.md
          - Specification/contracts/ingest/common/sparse_vocabulary.md
          - Specification/contracts/ingest/common/bm25_term_stats.md
          - Specification/contracts/ingest/common/sparse_strategies/bm25_like.md
        code_paths:
          - Execution/ingest/hybrid/ingest.py
        test_paths:
          - Execution/tests/ingest/hybrid/vocabulary_bootstrap_and_reuse.py
          - Execution/tests/ingest/hybrid/bm25_term_stats_lifecycle.py
          - Execution/tests/ingest/hybrid/vocabulary_reuse_e2e.py
          - Execution/tests/ingest/hybrid/bm25_term_stats_roundtrip.py
        test_mode: any
        status_text:
          conforms: "Hybrid ingest clearly implements vocabulary and BM25 term-stats lifecycle handling."
          violates_spec: "Hybrid ingest does not clearly implement the required artifact lifecycle handling yet."
        code_rules:
          - path: Execution/ingest/hybrid/ingest.py
            exists: true
            contains_all:
              - "vocabulary_path"
              - "term_stats_path"
              - "rank_bm25"
        spec_rules:
          - path: Specification/codegen/ingest/hybrid.md
            contains_all:
              - "vocabulary is a singleton keyed by the configured base collection name"
              - "if `term_stats_path` already exists, hybrid ingest must load and validate it"
              - "if `term_stats_path` does not exist, hybrid ingest must build corpus-level term stats"

  fixed_chunker:
    description: "Detect high-signal spec/code drift for the fixed chunker."
    checks:
      - id: fixed_chunker.sentence_segmentation.uses_spacy_sentencizer
        direction: requirement
        category: sentence_segmentation
        confidence: high
        title: "Fixed chunker sentence segmentation must use spaCy sentencizer"
        description: "The fixed chunker should initialize a blank spaCy pipeline and add only the sentencizer."
        spec_paths:
          - Specification/codegen/chunker/fixed.md
        code_paths:
          - Execution/parsing/chunker/fixed/chunker.py
        test_paths:
          - Execution/tests/parsing/chunker/fixed/synthetic_regression.py
        test_mode: any
        status_text:
          conforms: "Fixed chunker sentence segmentation uses spaCy sentencizer as specified."
          violates_spec: "Fixed chunker sentence segmentation does not clearly use the specified spaCy sentencizer setup."
        code_rules:
          - path: Execution/parsing/chunker/fixed/chunker.py
            contains_all:
              - "import spacy"
              - "nlp = spacy.blank(language)"
              - "nlp.add_pipe(\"sentencizer\")"
        spec_rules:
          - path: Specification/codegen/chunker/fixed.md
            contains_all:
              - "spaCy sentencizer"
              - "create `nlp` through `spacy.blank(CONFIG.sentence_segmentation.language)`"
              - "add `sentencizer` through `nlp.add_pipe(\"sentencizer\")`"

      - id: fixed_chunker.tokenizer.uses_hf_tokenizers
        direction: requirement
        category: tokenizer
        confidence: high
        title: "Fixed chunker token counting must use Hugging Face tokenizers"
        description: "Token counting should use the configured tokenizer artifact through the tokenizers library."
        spec_paths:
          - Specification/codegen/chunker/fixed.md
        code_paths:
          - Execution/parsing/chunker/fixed/chunker.py
        test_paths:
          - Execution/tests/parsing/chunker/fixed/synthetic_regression.py
        test_mode: any
        status_text:
          conforms: "Fixed chunker token counting uses the tokenizers library and configured artifact."
          violates_spec: "Fixed chunker token counting does not clearly use the specified tokenizers-based path."
        code_rules:
          - path: Execution/parsing/chunker/fixed/chunker.py
            contains_all:
              - "from tokenizers import Tokenizer"
              - "Tokenizer.from_pretrained(source"
              - "len(tokenizer.encode(stripped).ids)"
        spec_rules:
          - path: Specification/codegen/chunker/fixed.md
            contains_all:
              - "tokenizer.library"
              - "tokenizer.source"
              - "`token_count` must be computed by the normative tokenizer"

      - id: fixed_chunker.content_start_page.ignores_front_matter_for_derivation
        direction: requirement
        category: metadata
        confidence: high
        title: "content_start_page must ignore front_matter and derive from body ranges"
        description: "The fixed chunker should derive content_start_page only from parts, chapters, sections, and subsections."
        spec_paths:
          - Specification/codegen/chunker/fixed.md
        code_paths:
          - Execution/parsing/chunker/fixed/chunker.py
        test_paths:
          - Execution/tests/parsing/chunker/fixed/synthetic_regression.py
          - Execution/tests/parsing/chunker/fixed/page_mapping.py
        test_mode: any
        status_text:
          conforms: "content_start_page derivation is scoped to body metadata levels and retains the required fail-fast path."
          violates_spec: "content_start_page derivation does not clearly match the specified metadata scope."
        code_rules:
          - path: Execution/parsing/chunker/fixed/chunker.py
            contains_all:
              - "for key in (\"parts\", \"chapters\", \"sections\", \"subsections\"):"
              - "Unable to determine content_start_page from CONTENT_METADATA"
        spec_rules:
          - path: Specification/codegen/chunker/fixed.md
            contains_all:
              - "`front_matter` must not participate in the computation of `content_start_page`"
              - "`content_start_page = min(all_collected_starts)`"
              - "if there is no valid start at these levels, the chunker must fail"

      - id: fixed_chunker.overlap.page_mapping_regression_runners_exist
        direction: requirement
        category: tests
        confidence: medium
        title: "Fixed chunker regression runners for overlap and page mapping must exist"
        description: "The curated executable regression runners for page mapping and synthetic behavior should remain present."
        spec_paths:
          - Specification/codegen/chunker/fixed.md
          - Specification/testgen/chunker/fixed/page_mapping.md
          - Specification/testgen/chunker/fixed/synthetic_regression.md
        code_paths:
          - Execution/tests/parsing/chunker/fixed/page_mapping.py
          - Execution/tests/parsing/chunker/fixed/synthetic_regression.py
        test_paths:
          - Execution/tests/parsing/chunker/fixed/page_mapping.py
          - Execution/tests/parsing/chunker/fixed/synthetic_regression.py
        test_mode: all
        status_text:
          conforms: "Curated fixed chunker executable regression runners are present."
          violates_spec: "One or more curated fixed chunker executable regression runners are missing."
        code_rules:
          - path: Execution/tests/parsing/chunker/fixed/page_mapping.py
            exists: true
          - path: Execution/tests/parsing/chunker/fixed/synthetic_regression.py
            exists: true
        spec_rules:
          - path: Specification/testgen/chunker/fixed/page_mapping.md
            exists: true
          - path: Specification/testgen/chunker/fixed/synthetic_regression.md
            exists: true

  rag_runtime:
    description: "Detect high-signal spec/code drift for the RAG runtime."
    checks:
      - id: rag_runtime.generation.token_counting.uses_real_tokenizer
        direction: requirement
        category: generation
        confidence: high
        title: "Generation token counting must use the real tokenizer"
        description: "Generation token accounting must not fall back to whitespace splitting."
        spec_paths:
          - Specification/codegen/rag_runtime/generation/generation.md
        code_paths:
          - Execution/rag_runtime/src/generation/mod.rs
        backlog_keywords:
          - whitespace-based token counting
          - tokenizer-based counting
        status_text:
          conforms: "Generation token counting does not show the whitespace-splitting fallback."
          violates_spec: "Generation token counting still uses whitespace splitting."
        code_rules:
          - path: Execution/rag_runtime/src/generation/mod.rs
            contains_all:
              - ".count_tokens(&full_chat_prompt(prompt))"
            contains_none:
              - "split_whitespace().count()"
        spec_rules:
          - path: Specification/codegen/rag_runtime/generation/generation.md
            contains_all:
              - "generation token accounting must use a Hugging Face compatible tokenizer"

      - id: rag_runtime.observability.runtime_dashboard_inventory
        direction: requirement
        category: dashboards
        confidence: high
        title: "Runtime dashboard inventory must match the spec"
        description: "The two required runtime Grafana dashboards must exist."
        spec_paths:
          - Specification/codegen/rag_runtime/observability/grafana_dashboards.md
          - Specification/codegen/rag_runtime/generated_artifacts.md
        code_paths:
          - Measurement/observability/grafana/dashboards/request_overview.json
          - Measurement/observability/grafana/dashboards/ai_overview.json
        status_text:
          conforms: "Both required runtime dashboards exist."
          violates_spec: "One or more required runtime dashboards are missing."
        code_rules:
          - path: Measurement/observability/grafana/dashboards/request_overview.json
            exists: true
          - path: Measurement/observability/grafana/dashboards/ai_overview.json
            exists: true
        spec_rules:
          - path: Specification/codegen/rag_runtime/observability/grafana_dashboards.md
            contains_all:
              - "Measurement/observability/grafana/dashboards/request_overview.json"
              - "Measurement/observability/grafana/dashboards/ai_overview.json"

      - id: rag_runtime.config.metrics_enabled_is_typed_and_schema_backed
        direction: requirement
        category: config
        confidence: high
        title: "metrics_enabled must exist in typed config and schema"
        description: "Observability config should stay aligned across spec, typed settings, and JSON schema."
        spec_paths:
          - Specification/codegen/rag_runtime/rag_runtime.md
          - Specification/codegen/rag_runtime/observability/implementation.md
        code_paths:
          - Execution/rag_runtime/src/config/mod.rs
          - Execution/rag_runtime/schemas/rag_runtime_config.schema.json
        test_paths:
          - Execution/rag_runtime/src/config/mod.rs
        test_mode: any
        status_text:
          conforms: "metrics_enabled is present in typed config and JSON schema."
          violates_spec: "metrics_enabled is missing from typed config or JSON schema."
        code_rules:
          - path: Execution/rag_runtime/src/config/mod.rs
            contains_all:
              - "pub metrics_enabled: bool"
          - path: Execution/rag_runtime/schemas/rag_runtime_config.schema.json
            contains_all:
              - "\"metrics_enabled\""
        spec_rules:
          - path: Specification/codegen/rag_runtime/rag_runtime.md
            contains_all:
              - "metrics_enabled: bool"

      - id: rag_runtime.input_validation.token_counting.uses_real_tokenizer
        direction: requirement
        category: input_validation
        confidence: high
        title: "Input validation token counting must use the real tokenizer"
        description: "Input validation token accounting must not fall back to whitespace splitting."
        spec_paths:
          - Specification/codegen/rag_runtime/input_validation.md
        code_paths:
          - Execution/rag_runtime/src/input_validation/mod.rs
        test_paths:
          - Execution/rag_runtime/src/input_validation/mod.rs
        test_mode: any
        status_text:
          conforms: "Input validation token counting does not show the whitespace-splitting fallback."
          violates_spec: "Input validation token counting still uses whitespace splitting."
        code_rules:
          - path: Execution/rag_runtime/src/input_validation/mod.rs
            contains_all:
              - "record_query_token_count(token_count)"
            contains_none:
              - "split_whitespace().count()"
        spec_rules:
          - path: Specification/codegen/rag_runtime/input_validation.md
            contains_all:
              - "the implementation must use a Hugging Face compatible tokenizer"

      - id: rag_runtime.config.top_k_may_exceed_max_context_chunks
        direction: requirement
        category: config
        confidence: high
        title: "Startup must allow top_k greater than max_context_chunks"
        description: "Runtime startup must allow retrieval.top_k to exceed generation.max_context_chunks so reranking can operate on a larger candidate set."
        spec_paths:
          - Specification/codegen/rag_runtime/rag_runtime.md
          - Specification/codegen/rag_runtime/unit_tests.md
        code_paths:
          - Execution/rag_runtime/src/config/mod.rs
        test_paths:
          - Execution/rag_runtime/src/config/mod.rs
        test_mode: any
        status_text:
          conforms: "Startup allows retrieval.top_k to exceed generation.max_context_chunks."
          violates_spec: "Runtime still appears to reject retrieval.top_k greater than generation.max_context_chunks."
        code_rules:
          - path: Execution/rag_runtime/src/config/mod.rs
            contains_all:
              - "top_k_above_max_context_chunks_is_allowed_for_reranking"
            contains_none:
              - "retrieval.top_k {} must not exceed generation.max_context_chunks {}"
        spec_rules:
          - path: Specification/codegen/rag_runtime/rag_runtime.md
            contains_all:
              - "startup validation must allow `RetrievalSettings.top_k > GenerationSettings.max_context_chunks`"

      - id: rag_runtime.generation.request_shape_matches_ollama_contract
        direction: requirement
        category: generation
        confidence: high
        title: "Generation request shape must match the Ollama chat contract"
        description: "Generation should send stream=false and exactly two chat messages."
        spec_paths:
          - Specification/codegen/rag_runtime/generation/ollama_transport.md
        code_paths:
          - Execution/rag_runtime/src/generation/ollama.rs
        test_paths:
          - Execution/rag_runtime/src/generation/ollama.rs
        test_mode: any
        status_text:
          conforms: "Generation request body includes stream=false and the expected two-message shape."
          violates_spec: "Generation request body does not show the expected Ollama chat request shape."
        code_rules:
          - path: Execution/rag_runtime/src/generation/ollama.rs
            contains_all:
              - "\"stream\": false"
              - "\"messages\": ["
              - "{\"role\": \"system\", \"content\": prompt.system}"
              - "{\"role\": \"user\", \"content\": prompt.user}"
              - "\"temperature\": runtime.temperature"
        spec_rules:
          - path: Specification/codegen/rag_runtime/generation/ollama_transport.md
            contains_all:
              - "`stream` — boolean; must be `false`"
              - "`messages` — non-empty array; each item is an object with `role` (non-empty string) and `content` (string)"
              - "`options.temperature` — floating-point number"

      - id: rag_runtime.retrieval.retry_uses_backon
        direction: requirement
        category: retrieval
        confidence: high
        title: "Retrieval retry paths must use backon"
        description: "Embedding and Qdrant retry execution should use the backon crate through the shared helper."
        spec_paths:
          - Specification/codegen/rag_runtime/retrieve/dense_retrieval.md
          - Specification/codegen/rag_runtime/retrieve/hybrid_retrieval.md
        code_paths:
          - Execution/rag_runtime/src/retrieval/mod.rs
          - Execution/rag_runtime/Cargo.toml
        test_paths:
          - Execution/rag_runtime/src/retrieval/mod.rs
        test_mode: any
        status_text:
          conforms: "Retrieval retry paths use backon through the shared retry helper."
          violates_spec: "Retrieval retry paths do not clearly use backon through the shared helper."
        code_rules:
          - path: Execution/rag_runtime/src/retrieval/mod.rs
            contains_all:
              - "use backon::{ExponentialBuilder, Retryable};"
              - "retry_with_policy("
              - "ExponentialBuilder::default()"
              - ".with_jitter()"
          - path: Execution/rag_runtime/Cargo.toml
            contains_all:
              - "backon = "
        spec_rules:
          - path: Specification/codegen/rag_runtime/retrieve/dense_retrieval.md
            contains_all:
              - "retrieval retry/backoff execution must use the `backon` crate"
          - path: Specification/codegen/rag_runtime/retrieve/hybrid_retrieval.md
            contains_all:
              - "retrieval retry/backoff execution must use the `backon` crate"

      - id: rag_runtime.retrieval.settings_contract_is_typed_and_schema_backed
        direction: requirement
        category: retrieval
        confidence: high
        title: "Retrieval settings must expose typed kind/ingest/strategy contracts"
        description: "The runtime retrieval config contract should be represented as typed RetrievalKind, RetrievalIngest, and RetrievalStrategy objects, with schema support for kind."
        spec_paths:
          - Specification/codegen/rag_runtime/rag_runtime.md
          - Specification/contracts/rag_runtime/config.md
        code_paths:
          - Execution/rag_runtime/src/config/mod.rs
          - Execution/rag_runtime/schemas/rag_runtime_config.schema.json
        test_paths:
          - Execution/rag_runtime/src/config/mod.rs
        test_mode: any
        status_text:
          conforms: "Retrieval settings clearly expose typed retrieval kind, ingest, and strategy contracts with schema support."
          violates_spec: "Retrieval settings do not yet clearly expose the required typed retrieval kind/ingest/strategy contracts."
        code_rules:
          - path: Execution/rag_runtime/src/config/mod.rs
            contains_all:
              - "pub enum RetrievalKind"
              - "pub kind: RetrievalKind"
              - "pub enum RetrievalIngest"
              - "pub enum RetrievalStrategy"
          - path: Execution/rag_runtime/schemas/rag_runtime_config.schema.json
            contains_all:
              - "\"retrieval\""
              - "\"kind\""
              - "\"hybrid\""
        spec_rules:
          - path: Specification/codegen/rag_runtime/rag_runtime.md
            contains_all:
              - "`RetrievalIngest` enum variants:"
              - "`RetrievalStrategy` enum variants:"
              - "`ingest: RetrievalIngest`"

      - id: rag_runtime.retrieval.orchestration_factory_maps_ingest_to_implementation
        direction: requirement
        category: retrieval
        confidence: high
        title: "Orchestration must map retrieval ingest variant to the concrete retriever"
        description: "The orchestration layer should construct dense or hybrid retrievers behind the shared Retriever trait."
        spec_paths:
          - Specification/codegen/rag_runtime/orchestration.md
          - Specification/codegen/rag_runtime/retrieve/integration.md
        code_paths:
          - Execution/rag_runtime/src/orchestration/mod.rs
        test_paths:
          - Execution/rag_runtime/src/orchestration/mod.rs
        test_mode: any
        status_text:
          conforms: "Orchestration clearly maps retrieval ingest variants to concrete retriever implementations behind the shared trait."
          violates_spec: "Orchestration does not yet clearly map retrieval ingest variants to concrete retriever implementations behind the shared trait."
        code_rules:
          - path: Execution/rag_runtime/src/orchestration/mod.rs
            contains_all:
              - "Box<dyn Retriever + Send + Sync>"
              - "DenseRetriever"
              - "HybridRetriever"
        spec_rules:
          - path: Specification/codegen/rag_runtime/orchestration.md
            contains_all:
              - "Box<dyn Retriever + Send + Sync>"
              - "DenseRetriever"
              - "HybridRetriever"
          - path: Specification/codegen/rag_runtime/retrieve/integration.md
            contains_all:
              - "pub trait Retriever"
              - "&ValidatedUserRequest"
              - "&RetrievalSettings"

      - id: rag_runtime.retrieval.request_capture_fields_are_typed_and_persisted
        direction: requirement
        category: retrieval
        confidence: high
        title: "RequestCapture must persist retriever metadata"
        description: "The request-capture shape and storage contract must include retriever kind and config snapshots."
        spec_paths:
          - Specification/codegen/rag_runtime/rag_runtime.md
          - Specification/contracts/rag_runtime/request_capture.md
          - Specification/contracts/storage/request_captures_storage.md
        code_paths:
          - Execution/rag_runtime/src/models/mod.rs
          - Execution/rag_runtime/src/request_capture_store/mod.rs
          - Execution/rag_runtime/schemas/request_capture.schema.json
          - Execution/docker/postgres/init/001_request_captures.sql
        test_paths:
          - Execution/rag_runtime/src/request_capture_store/mod.rs
          - Execution/rag_runtime/src/orchestration/mod.rs
        test_mode: any
        status_text:
          conforms: "RequestCapture clearly persists retriever kind and config snapshots."
          violates_spec: "RequestCapture does not clearly persist the required retriever metadata yet."
        code_rules:
          - path: Execution/rag_runtime/src/models/mod.rs
            contains_all:
              - "pub retriever_kind: RetrieverKind"
              - "pub retriever_config: RetrieverConfig"
          - path: Execution/rag_runtime/src/request_capture_store/mod.rs
            contains_all:
              - "retriever_kind"
              - "retriever_config"
          - path: Execution/rag_runtime/schemas/request_capture.schema.json
            contains_all:
              - "\"retriever_kind\""
              - "\"retriever_config\""
          - path: Execution/docker/postgres/init/001_request_captures.sql
            contains_all:
              - "retriever_kind"
              - "retriever_config"
        spec_rules:
          - path: Specification/contracts/rag_runtime/request_capture.md
            contains_all:
              - "`retriever_kind`"
              - "`retriever_config`"

      - id: rag_runtime.public_api.main_entrypoints_exist
        direction: requirement
        category: public_api
        confidence: high
        title: "RagRuntime public entrypoints must exist"
        description: "The crate should expose RagRuntime::from_config_paths and RagRuntime::handle_request."
        spec_paths:
          - Specification/codegen/rag_runtime/rag_runtime.md
        code_paths:
          - Execution/rag_runtime/src/lib.rs
        test_paths:
          - Execution/rag_runtime/src/lib.rs
          - Execution/rag_runtime/tests/e2e_smoke.rs
        test_mode: any
