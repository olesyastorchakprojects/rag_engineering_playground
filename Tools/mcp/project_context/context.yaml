debugging_defaults:
  primary_runtime_signal: observability
  cli_logs_priority: secondary
  retrieval_truth: qdrant
  eval_truth: postgres
  contract_truth: specification
  trace_truth: tempo_and_phoenix
  provider_switch_truth: project_context
  cli_trace_visibility:
    default_agent_rust_log: warn
    symptom: "rag_runtime CLI traces appear missing in Phoenix when launched from the agent shell without overriding RUST_LOG"
    required_action: "Always launch rag_runtime CLI with a RUST_LOG that allows info spans before using Phoenix as the runtime trace source of truth"
    suggested_values:
      - rag_runtime=info
      - rag_runtime=trace
  local_metrics_limitations:
    applies_to: "Prometheus histogram latency panels for local rag_runtime CLI traffic"
    sparse_traffic_effect: "Sparse or intermittent request flows can push histogram_quantile(rate(..._bucket[window])) panels toward bucket-tail values and make latency graphs look misleading after pauses"
    interpretation_rule: "For local sparse traffic, treat Phoenix traces as the latency source of truth; Prometheus latency panels become more trustworthy only under steadier request rates"
    known_tail_example_ms: 2500
  provider_switch_failure_modes:
    applies_to:
      - generation
      - reranking
      - eval_judging
    common_signals:
      - missing API key
      - wrong base URL
      - incompatible response shape
      - rate limit or timeout
      - transport_kind/provider mismatch
    first_checks:
      - "Confirm the active provider in the relevant TOML config."
      - "Confirm the provider-specific env vars are present in the runtime env."
      - "If the path is external, confirm the OpenAI-compatible or provider-specific endpoint shape matches the selected transport."

language_boundaries:
  rust:
    use_for:
      - runtime
      - retrieval
      - reranking
      - production_path_logic
  python:
    use_for:
      - evals
      - chunking
      - ingest
      - orchestration
      - launchers
      - offline_tooling

decision_rules:
  when_question_is_about:
    service_roles: project_context_mcp
    data_flow: project_context_mcp
    debugging_path: project_context_mcp
    language_choice: project_context_mcp
    storage_ownership: project_context_mcp
