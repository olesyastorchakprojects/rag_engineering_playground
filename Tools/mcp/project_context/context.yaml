  - from: eval_engine
    to: ollama
    description: "Eval workers send long-running judge requests to the Ollama-hosted judge model"
  - from: eval_engine
    to: postgres
    description: "Eval workers read request captures and write eval_processing_state, judge tables, request_summaries, and request_run_summaries in Postgres"
  - from: agent_orchestrator
    to: Execution/orchestration/agent_workflow_runner.py
    description: "The workflow control plane coordinates planning, status, retries, and artifact handoff through the execution-side runner"
  - from: eval_engine
    to: artifact_storage
    description: "Eval orchestrator writes and updates the structured run_manifest.json artifact"
  - from: eval_engine
    to: artifact_storage
    description: "Eval orchestrator writes one human-readable run_report.md artifact"
  - from: eval_engine
    to: tempo
