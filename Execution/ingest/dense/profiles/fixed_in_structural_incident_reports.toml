[pipeline]
name = "dense_ingest"
chunk_schema_version = 1
ingest_config_version = "v3"
corpus_version = "v3"
chunking_strategy = "fixed_in_structural"

[embedding.model]
name = "qwen3-embedding:0.6b"
dimension = 1024

[embedding.input]
text_source = "chunk.text"

[embedding.transport]
timeout_sec = 60
max_batch_size = 1

[embedding.retry]
max_attempts = 3
backoff = "exponential"

[qdrant.collection]
name = "incident_reports_dense_qwen3_fixed_in_structural"
distance = "Cosine"
vector_name = "default"
create_if_missing = true

[qdrant.point_id]
strategy = "uuid5(chunk.chunk_id)"
namespace_uuid = "6f4c2c14-7d3a-5f77-8e4b-32cb4f6cf0d1"
format = "canonical_uuid"

[qdrant.transport]
timeout_sec = 30
upsert_batch_size = 64

[qdrant.retry]
max_attempts = 3
backoff = "exponential"

[idempotency]
strategy = "field_tuple_hash"
fingerprint_fields = [
  "content_hash",
]
on_fingerprint_change = "log_and_skip"
on_metadata_change = "update_changed_fields"

[logging]
failed_chunk_log_path = "out/fixed_in_structural_incident_reports_ingest_failed_chunks.jsonl"
skipped_chunk_log_path = "out/fixed_in_structural_incident_reports_ingest_skipped_chunks.jsonl"
